<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Football ML — {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    {% block head %}{% endblock %}
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/">
          <i class="bi bi-trophy-fill text-warning me-2"></i>Football ML
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
          aria-controls="nav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto gap-1">
            <li class="nav-item">
              <a
                class="nav-link rounded px-3 {% if request.path in ['/', '/ml'] %}active bg-primary text-white{% endif %}"
                href="/ml"
              >
                <i class="bi bi-diagram-3 me-1"></i>Machine Learning
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link rounded px-3 {% if request.path == '/nn' %}active bg-primary text-white{% endif %}"
                href="/nn"
              >
                <i class="bi bi-cpu me-1"></i>Neural Network
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link rounded px-3 {% if request.path == '/demo/ml' %}active bg-success text-white{% endif %}"
                href="/demo/ml"
              >
                <i class="bi bi-person-badge me-1"></i>Demo ML
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link rounded px-3 {% if request.path == '/demo/nn' %}active bg-success text-white{% endif %}"
                href="/demo/nn"
              >
                <i class="bi bi-lightning-charge me-1"></i>Demo NN
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Content -->
    <main>{% block content %}{% endblock %}</main>

    <!-- Footer -->
    <footer class="py-4 mt-5" style="background: #111827">
      <div class="container text-center">
        <p class="mb-1 fw-bold text-white">
          <i class="bi bi-trophy-fill text-warning me-2"></i>Football ML
          Classification
        </p>
        <p class="small mb-0" style="color: #9ca3af">
          IS Project &middot; Python + Flask + TensorFlow &middot; 2024
        </p>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
