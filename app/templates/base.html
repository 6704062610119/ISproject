<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football — {% block title %}{% endblock %}</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700&display=swap" />
  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    crossorigin="anonymous" />
  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block head %}{% endblock %}
</head>

<body>

  <!-- ═══════════════════ ANIMATED BACKGROUND ORBS ═══════════════════ -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-orb bg-orb-4"></div>
  <div class="bg-orb bg-orb-5"></div>

  <!-- ═══════════════════════════ NAVBAR ═══════════════════════════════ -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <!-- Brand -->
      <a class="navbar-brand" href="/">
        <span class="brand-icon">
          <i class="bi bi-trophy-fill" style="color:#f59e0b;font-size:.85rem;"></i>
        </span>
        Football
      </a>

      <!-- Toggler -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav"
        aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Links -->
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/' %}nav-active-pill{% endif %}" href="/" id="nav-home">
              <i class="bi bi-house-door me-1"></i>Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/ml' %}nav-active-pill{% endif %}" href="/ml" id="nav-ml">
              <i class="bi bi-diagram-3 me-1"></i>Machine Learning
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/nn' %}nav-active-pill{% endif %}" href="/nn" id="nav-nn">
              <i class="bi bi-cpu me-1"></i>Neural Network
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/demo/ml' %}nav-active-pill{% endif %}" href="/demo/ml"
              id="nav-demo-ml">
              <i class="bi bi-person-badge me-1"></i>Demo ML
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.path == '/demo/nn' %}nav-active-pill{% endif %}" href="/demo/nn"
              id="nav-demo-nn">
              <i class="bi bi-lightning-charge me-1"></i>Demo NN
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ══════════════════════════ CONTENT ════════════════════════════── -->
  <main>{% block content %}{% endblock %}</main>

  <!-- ═══════════════════════════ FOOTER ═══════════════════════════════ -->
  <footer class="py-5 mt-5">
    <div class="container text-center">
      <p class="mb-2">
        <span class="footer-brand">
          Football<span class="footer-brand-dot"></span>
        </span>
        <span style="color:#4b5563;margin:0 6px;">—</span>
        <span style="color:#9ca3af;font-size:.88rem;">Classification</span>
      </p>
      <p class="mb-0" style="color:#4b5563;font-size:.82rem;letter-spacing:.3px;">
        IS&nbsp;Project &middot; Python + Flask + TensorFlow &middot; 2024
      </p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
  {% block scripts %}{% endblock %}
</body>

</html>
